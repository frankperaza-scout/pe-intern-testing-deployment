apiVersion: apps/v1
kind: Deployment
metadata:
  name: pe-intern-testing-deployment
  labels:
    app.kubernetes.io/name: pe-intern-testing-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pe-intern-testing-deployment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pe-intern-testing-deployment
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
